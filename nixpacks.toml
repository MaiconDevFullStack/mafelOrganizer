# nixpacks.toml — instrui o Railway a buildar o backend na subpasta /backend
# Docs: https://nixpacks.com/docs/configuration/file

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["cd backend && npm ci --omit=dev"]

[phases.build]
cmds = []

[start]
cmd = "cd backend && node src/index.js"
